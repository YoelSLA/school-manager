server:
  # Puerto utilizado en el entorno de producción.
  port: ${PORT:8080}

spring:
  datasource:
    # Configuración de conexión obtenida desde variables de entorno.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Valida que el esquema de la base de datos coincida con las entidades.
      # No crea ni modifica tablas.
      ddl-auto: validate

    # No muestra las consultas SQL generadas por Hibernate.
    show-sql: false

    # Deshabilita Open Session In View.
    # Obliga a resolver las relaciones lazy dentro de la capa de servicio.
    open-in-view: true

    properties:
      hibernate:
        # Deshabilita estadísticas internas de Hibernate.
        generate_statistics: false

        # Mantiene el SQL sin formatear.
        format_sql: false

  flyway:
    # Ejecuta automáticamente las migraciones al iniciar la aplicación.
    enabled: true

    # No crea una baseline automáticamente.
    # Se espera que el esquema sea gestionado completamente por Flyway.
    baseline-on-migrate: false

  jackson:
    # Zona horaria utilizada para serializar y deserializar fechas.
    time-zone: America/Argentina/Buenos_Aires

logging:
  level:
    # Deshabilita el log de consultas SQL generadas por Hibernate.
    org.hibernate.SQL: OFF

    # Deshabilita el log de parámetros enviados a las consultas.
    org.hibernate.orm.jdbc.bind: OFF

    # Deshabilita el log de estadísticas de Hibernate.
    org.hibernate.stat: OFF