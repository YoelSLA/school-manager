version: "3.8"

services:
  db:
    image: postgres:16
    container_name: gestion-db
    restart: always
    environment:
      POSTGRES_DB: gestion_escolar_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: